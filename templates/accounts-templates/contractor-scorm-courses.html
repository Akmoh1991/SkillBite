<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدورات الإلكترونية</title>

<style>
@import url('/static/branding/branding.css');
:root{
  --blue-dark:#0027b9;
  --blue-main:#0076ff;
  --orange:#0076ff;

  --bg:#f7f9fc;
  --card:#ffffff;

  --text:#1f2937;
  --muted:#5f6f85;

  --sidebar-w:260px;
  --topbar-h:70px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: "SE", "Segoe UI", Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  margin-right:var(--sidebar-w);
  padding: calc(var(--topbar-h) + 36px) 28px 40px;
}

.page-header{ margin-bottom:18px; }
.page-header h2{ margin:0; font-size:18px; color:var(--blue-main); }

.list-wrapper{
  background:var(--card);
  border-radius:16px;
  box-shadow:0 14px 34px rgba(15,45,90,.12);
  overflow:hidden;
}

.list-header,
.list-row{
  display:grid;
  grid-template-columns: 2.4fr 1fr 1fr;
  align-items:center;
  padding:16px 22px;
}

.list-header{
  background:#f5f8fd;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
}

.list-row{
  border-top:1px solid #eef1f5;
  font-size:14px;
}

.list-row:hover{ background:#f4f8ff; }

.action-btn{
  display:inline-block;
  padding:8px 12px;
  border-radius:12px;
  background:#e9eef6;
  color:var(--blue-main);
  font-weight:700;
  font-size:12px;
  text-decoration:none;
  width:max-content;
}

.action-btn:hover{ background:#dfe8f6; }

.empty{
  background:#fff;
  padding:40px;
  border-radius:16px;
  text-align:center;
  color:var(--muted);
}

@media (max-width:900px){
  .sidebar{ display:none; }
  .topbar{ right:0; }
  .main{ margin-right:0; }

  .list-header,
  .list-row{
    grid-template-columns:1fr;
    row-gap:8px;
  }
}
</style>
</head>

<body>

{% include "accounts-templates/sidebar.html" %}
{% include "accounts-templates/topbar.html" %}

<div class="main">

  <div class="page-header">
    <h2>الدورات الإلكترونية</h2>
  </div>

  {% if packages %}
    <div class="list-wrapper">

      <div class="list-header">
        <div>الملف</div>
        <div>الحجم (KB)</div>
        <div>عرض</div>
      </div>

      {% for p in packages %}
        <div class="list-row">
          <div style="font-weight:600; color:var(--blue-main);">{{ p.name }}</div>
          <div style="color:var(--muted);">{{ p.size_kb|default:"—" }}</div>
          <div>
            <a class="action-btn" href="{% url 'contractor_scorm_course_view' p.name %}">عرض</a>
          </div>
        </div>
      {% endfor %}

    </div>
  {% else %}
    <div class="empty">لا توجد دورات إلكترونية متاحة حالياً</div>
  {% endif %}

</div>

</body>
</html>
