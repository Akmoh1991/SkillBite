<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول الاختبار - كود الدخول</title>
<style>
@import url('/static/branding/branding.css');
:root{
  --blue-dark:#0027b9;
  --blue-main:#0076ff;
  --bg:#f7f9fc;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#5f6f85;
  --sidebar-w:260px;
  --topbar-h:70px;
}
*{box-sizing:border-box}
body{margin:0;font-family: "SE", "Segoe UI", Tahoma, Arial, sans-serif;background:var(--bg);color:var(--text);}
.topbar{
  position:fixed;
  top:0;
  right:var(--sidebar-w);
  left:0;
  height:var(--topbar-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 26px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  z-index:1000;
}
.main{margin-right:var(--sidebar-w);padding: calc(var(--topbar-h) + 22px) 28px 30px;}
.card{background:var(--card);border-radius:16px;box-shadow:0 14px 34px rgba(15,45,90,.12);overflow:hidden;max-width:700px;}
.section{padding:18px 22px;border-top:1px solid #eef1f5;}
.section:first-child{border-top:none;}
.title{margin:0;font-size:16px;color:var(--blue-main);font-weight:900;}
.hint{color:var(--muted);font-size:13px;line-height:1.8;margin:10px 0 0;}
.msg{margin-bottom:14px;padding:12px 14px;border-radius:14px;font-size:13px;font-weight:700;}
.msg-error, .msg.error{ background:#fff1f2; border:1px solid #fecdd3; color:#9f1239; }
.msg-success, .msg.success{ background:#ecfdf5; border:1px solid #bbf7d0; color:#166534; }
.msg-info, .msg.info{ background:#eff6ff; border:1px solid #bfdbfe; color:#1e3a8a; }
.input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d1d5db;outline:none;font-family: "SE", "Segoe UI", Tahoma, Arial, sans-serif;background:#fff;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.btn{display:inline-block;padding:10px 14px;border-radius:12px;border:none;cursor:pointer;font-weight:800;font-size:13px;text-decoration:none;}
.btn-primary{background:#0076ff;color:#fff;}
.btn-soft{background:#e9eef6;color:var(--blue-main);}

@media (max-width:900px){
  .sidebar{display:none;}
  .topbar{right:0;}
  .main{margin-right:0;}
}
</style>
</head>
<body>

{% include "accounts-templates/sidebar.html" %}
{% include "accounts-templates/topbar.html" %}

<div class="main">

  {% if messages %}
    {% for message in messages %}
      <div class="msg {{ message.tags|default:'info' }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <div class="card">
    <div class="section">
      <h2 class="title">🔒 دخول الاختبار</h2>
      <!--<p class="hint">
        يجب إدخال كود الاختبار قبل فتح صفحة الاختبار.
        <br>
        في حال عدم حصولك على الكود، تواصل مع المدرب.
      </p>-->
    </div>

    <div class="section">
      <form method="post" action="{% url 'contractor_exam_view' enrollment.id %}">
        {% csrf_token %}
        <input type="hidden" name="unlock_exam" value="1">

        <div style="margin-bottom:8px; font-size:12px; color:var(--muted); font-weight:800;">  ادخل كود الإختبار</div>
        <input class="input" name="exam_code" inputmode="numeric" pattern="\d{8}" maxlength="8" required>

        <div class="actions">
          <button class="btn btn-primary" type="submit">دخول</button>
          <a class="btn btn-soft" href="{% url 'contractor_request_detail' enrollment.id %}">رجوع</a>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
