<style>
@import url('/static/branding/branding.css');
:root{
  --bg:#f7f9fc;
  --text:#1f2937;
  --muted:#5f6f85;
  --topbar-h:70px;
  --sidebar-w:260px;
  --blue-main:#0076ff;
  --orange:#0076ff;
}

.topbar{
  position:fixed;
  top:0;
  right:var(--sidebar-w);
  left:0;
  height:var(--topbar-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  box-shadow:0 8px 24px rgba(15,45,90,.08);
  border-bottom:1px solid #e8edf5;
  z-index:1200;
}

.topbar .user{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
  color:var(--text);
}

.topbar .badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  color:#fff;
  background:linear-gradient(135deg, #0076ff, #005fce);
}

.topbar .actions{
  display:flex;
  align-items:center;
  gap:14px;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:900px){
  .topbar{ right:0; }
}
</style>

<header class="topbar">
  <div class="user">
    <strong><span>مرحباً بك {{ request.user.username }} 👋</span></strong>
    <!--<span class="badge">منسق تدريب</span>-->
  </div>

</header>
