{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>

    <link rel="stylesheet" href="/static/branding/auth.css">
</head>
<body>

<div class="login-container">

    <div class="logo">
        <img src="{% static 'media/SkillBite_logo.png' %}" alt="Logo">
    </div>

    <h1>تسجيل الدخول</h1>
    <p class="subtitle">ادخل إلى حسابك لمتابعة الدورات والمهام وإدارة المحتوى.</p>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn">دخول</button>
    </form>

    <div class="footer">
        لا تملك حساب؟
        <a id="register-link" href="{% url 'register' %}">إنشاء حساب جديد</a>
    </div>

</div>
</body>
</html>
