{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>

    <style>
@import url('/static/branding/branding.css');
        :root {
            --auth-green: #0f766e;
            --auth-green-light: #11a36b;
            --auth-border: #dbe4ef;
            --auth-muted: #617182;
            --auth-bg: linear-gradient(180deg, #eef6f2 0%, #f7faf9 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "SE", "Segoe UI", Tahoma, Arial, sans-serif;
            background: var(--auth-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 40px 34px;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.12);
        }

        .logo {
            text-align: center;
            margin-bottom: 22px;
        }

        .logo img {
            height: 78px;
        }

        h1 {
            text-align: center;
            margin: 0 0 10px;
            color: var(--auth-green);
            font-size: 34px;
            font-weight: 800;
            line-height: 1.15;
        }

        .subtitle {
            margin: 0 0 28px;
            text-align: center;
            color: var(--auth-muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #17212f;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--auth-border);
            font-size: 14px;
            transition: border 0.3s, box-shadow 0.3s;
            background: #fff;
            color: #17212f;
        }

        input:focus {
            outline: none;
            border-color: #86efac;
            box-shadow: 0 0 0 4px rgba(134,239,172,0.20);
        }

        .btn {
            width: 100%;
            min-height: 52px;
            padding: 14px 18px;
            border: none;
            border-radius: 999px;
            background: var(--auth-green);
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 14px 28px rgba(15, 118, 110, 0.18);
        }

        .btn:hover {
            background: var(--auth-green-light);
            box-shadow: 0 16px 30px rgba(134,239,172,0.28);
            transform: translateY(-1px);
        }

        .messages {
            margin-bottom: 20px;
        }

        .messages p {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #9f1239;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 14px;
            margin: 0;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }

        .footer a {
            color: var(--auth-green);
            text-decoration: none;
            font-weight: 800;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <img src="{% static 'media/SkillBite_logo.png' %}" alt="Logo">
    </div>

    <h1>تسجيل الدخول</h1>
    <p class="subtitle">ادخل إلى حسابك لمتابعة الدورات والمهام وإدارة المحتوى.</p>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn">دخول</button>
    </form>

    <div class="footer">
        لا تملك حساب؟
        <a id="register-link" href="{% url 'register' %}">إنشاء حساب جديد</a>
    </div>

</div>
</body>
</html>
