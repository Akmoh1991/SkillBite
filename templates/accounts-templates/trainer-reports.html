<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقارير المدرب</title>

<style>
@import url('/static/branding/branding.css');
:root{
  --blue-main:#0076ff;
  --orange:#0076ff;
  --bg:#f7f9fc;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#5f6f85;
  --border:#e5e7eb;
  --sidebar-w:260px;
  --topbar-h:70px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: "SE", "Segoe UI", Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  margin-right:var(--sidebar-w);
  padding:calc(var(--topbar-h) + 30px) 32px 40px;
}

.page-title{
  margin:0 0 14px;
  font-size:20px;
  color:var(--blue-main);
}

.card{
  background:var(--card);
  border-radius:16px;
  box-shadow:0 14px 34px rgba(15,45,90,.10);
  padding:16px;
  border:1px solid rgba(229,231,235,.6);
  margin-top:14px;
}

.filters{
  display:grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr;
  gap:12px;
  align-items:end;
}

.field label{
  display:block;
  font-size:12px;
  font-weight:700;
  color:#374151;
  margin-bottom:6px;
}

.field input,
.field select{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font-size:13px;
  outline:none;
  background:#fff;
}

.actions{
  display:flex;
  gap:10px;
  justify-content:flex-start;
}

.btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  font-size:13px;
  text-decoration:none;
}

.btn:hover,
.btn:focus,
.btn:active{
  text-decoration:none;
}

.btn-primary{ background:var(--blue-main); color:#fff; }
.btn-outline{ background:#fff; border:1px solid var(--border); color:#111827; }
.btn-orange{ background:var(--orange); color:#fff; }

.kpis{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
  margin:14px 0;
}

.kpi{
  background:#ffffff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 14px;
}

.kpi .label{ color:var(--muted); font-size:12px; font-weight:700; }
.kpi .value{ color:var(--blue-main); font-size:20px; font-weight:800; margin-top:6px; }

.section-title{
  margin:18px 0 10px;
  font-size:16px;
  font-weight:800;
  color:#0b2440;
}

.table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  overflow:hidden;
  border-radius:16px;
  border:1px solid var(--border);
  background:#fff;
}

.table th,
.table td{
  padding:12px 12px;
  border-bottom:1px solid var(--border);
  font-size:13px;
  vertical-align:top;
}

.table th{
  background:#f6f8fc;
  text-align:right;
  font-size:12px;
  color:#374151;
}

.table tr:last-child td{ border-bottom:none; }

.badge{
  display:inline-block;
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  background:#eef2ff;
  color:#3730a3;
  white-space:nowrap;
}

.badge.ok{ background:#dcfce7; color:#166534; }
.badge.warn{ background:#ffedd5; color:#9a3412; }
.badge.bad{ background:#fee2e2; color:#991b1b; }

.small{ color:var(--muted); font-size:12px; }

.grid-2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}

@media (max-width:1100px){
  .filters{ grid-template-columns: 1fr 1fr; }
  .kpis{ grid-template-columns: 1fr 1fr; }
  .grid-2{ grid-template-columns: 1fr; }
}

@media (max-width:900px){
  .main{ margin-right:0; }
}
</style>
</head>

<body>

{% include "accounts-templates/trainer-sidebar.html" %}
{% include "accounts-templates/trainer-topbar.html" %}

<main class="main">

  <h1 class="page-title">التقارير </h1>

 <!-- <div class="kpis">
    <div class="kpi">
      <div class="label">إجمالي الطلبات (حسب التصفية)</div>
      <div class="value">{{ total }}</div>
    </div>
    <div class="kpi">
      <div class="label">بطاقات الاجتياز</div>
      <div class="value">{{ pass_cards_count }}</div>
    </div>
    <div class="kpi">
      <div class="label">الشهادات الصادرة (ضمن الفترة)</div>
      <div class="value">{{ issued_certificates_count }}</div>
    </div>
    <div class="kpi">
      <div class="label">شهادات SCORM (ضمن الفترة)</div>
      <div class="value">{{ issued_scorm_certificates_count }}</div>
    </div>
  </div>-->

  <div class="card">
    <form method="get">
      <div class="filters">


        <div class="field">
          <label>البرنامج</label>
          <select name="program">
            <option value="">كل البرامج</option>
            {% for p in programs %}
              <option value="{{ p.id }}" {% if selected_program_id == p.id %}selected{% endif %}>{{ p.title }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>المنطقة</label>
          <select name="region">
            <option value="">كل المناطق</option>
            {% for r in regions %}
              <option value="{{ r.value }}" {% if selected_region == r.value %}selected{% endif %}>{{ r.label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>الحالة</label>
          <select name="status">
            <option value="">كل الحالات</option>
            {% for key,label in statuses %}
              <option value="{{ key }}" {% if selected_status == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>المدة التاريخية</label>
          <div style="display:flex; gap:10px;">
            <input type="date" name="start" value="{{ start|default:'' }}" style="flex:1;">
            <input type="date" name="end" value="{{ end|default:'' }}" style="flex:1;">
          </div>
          <!--<div class="small" style="margin-top:6px;">يتم التصفية حسب تاريخ إنشاء طلب التسجيل.</div>-->
        </div>

      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:14px; gap:10px; flex-wrap:wrap;">
        <div class="actions">
          <button class="btn btn-primary" type="submit">تطبيق التصفية</button>
          <a class="btn btn-outline" href="{% url 'trainer_reports' %}">إعادة ضبط</a>
        </div>

        <div class="actions">
          <a class="btn btn-orange" href="{% url 'trainer_reports_export_csv' %}?q={{ q|urlencode }}&program={{ selected_program_id|default:'' }}&region={{ selected_region|urlencode }}&status={{ selected_status|urlencode }}&start={{ start|urlencode }}&end={{ end|urlencode }}">
            تحميل التقرير   
          </a>
        </div>
      </div>

    </form>
  </div>

  <!--<h2 class="section-title">التقارير المتاحة</h2>

    <div class="small" style="margin-bottom:10px;">استخدم نفس الفلاتر أعلاه لتحديد الفترة/البرنامج ثم قم بتنزيل التقرير.</div>
    <div class="actions" style="flex-wrap:wrap;">
      <a class="btn btn-orange" href="{% url 'trainer_reports_export_csv' %}?q={{ q|urlencode }}&program={{ selected_program_id|default:'' }}&region={{ selected_region|urlencode }}&status={{ selected_status|urlencode }}&start={{ start|urlencode }}&end={{ end|urlencode }}">
        تحميل تقرير المسجلين (CSV)
      </a>
      <a class="btn btn-outline" href="{% url 'trainer_registered_trainees' %}">عرض المتدربين المسجلين</a>
    </div>
  </div>-->

</main>

</body>
</html>
